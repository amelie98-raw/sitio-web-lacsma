<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LACSMA | Corporativo de Calidad y Ensayos de Materiales S.A. de C.V</title>
   <meta name="description"
    content="Corporativo de Calidad y Ensayos de Materiales S.A. de C.V">
  <meta property="og:description" content="Análisis y verificación de materiales para la construcción." />
  <meta property="og:image" content="https://www.lacsma.com/assets/img/icon/Pat1.webp" />
  <meta property="og:url" content="https://www.lacsma.com" />
  <meta name="google-site-verification" content="JpkveYw6j71CssFyLHKTZXr5G9u0O4o76n-1fP68Lyc" />
  <link rel="icon" type="image/x-icon" href="assets/img/icon/fav.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/img/icon/apple-touch-icon.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400&family=Inter:wght@400;500&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/styles.css?v=1.1">
</head>

<body>

  <header id="navbar"></header>

  <main>

    <div id="banner-service"></div>

    <section class="lacsma-section py-5">
      <div class="container-fluid px-4 px-lg-5">

        <div id="cards-container" class="row g-4 justify-content-center">
        </div>

        <div id="button-load-more"></div>

      </div>
    </section>

  </main>

  <footer id="footer"></footer>

  <script>
    // 1. Cargar Navbar
    fetch("components/navbar.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("navbar").innerHTML = data;
      })
      .catch(error => console.error("Error cargando el navbar:", error));

    // 🎯 2. CORREGIDO: Cambiar textos e imagen usando la clase exacta de tu componente (.banner__photo)
    fetch("components/banner.html")
      .then(res => res.text())
      .then(data => {
        const contenedorBanner = document.getElementById("banner-service");
        contenedorBanner.innerHTML = data;

        const tituloBanner = contenedorBanner.querySelector(".banner__title");
        const subtituloBanner = contenedorBanner.querySelector(".banner__description");

        /* 📸 BUSQUEDA EXACTA: Buscamos la imagen por la clase de tu componente */
        const imagenBanner = contenedorBanner.querySelector(".banner__photo");

        if (tituloBanner) {
          tituloBanner.textContent = "Terracerías y Pavimentos";
        }
        if (subtituloBanner) {
          subtituloBanner.innerHTML = `
        <span class="punto-color">&bull;</span> 
        Evaluación del suelo donde se desarrollarán construcciones para garantizar la estabilidad y viabilidad del proyecto. Este servicio permite prever y corregir posibles inconvenientes en la cimentación y estructura de las obras.`;
        }

        /* 🎯 CAMBIO DE IMAGEN DEL BANNER: Asignamos las dimensiones requeridas por PageSpeed sin alterar el diseño */
        if (imagenBanner) {
          imagenBanner.src = "assets/img/terraceriabanner.webp";
          imagenBanner.alt = "Terracerías y Pavimentos - LACSMA";
          imagenBanner.setAttribute("width", "1920");
          imagenBanner.setAttribute("height", "450");
        }
      })
      .catch(error => console.error("Error cargando el banner:", error));

    // 3. CARGAR TARJETAS DE SERVICIOS AUTOMÁTICAMENTE
    const listadoServicios = [
      {
        title: "Estudio de materiales",
        desc: "Se seleccionan muestras representativas de concreto fresco en obra directamente del camión mezclador para garantizar que cumplan con todos los ensayos requeridos.",
        img: "assets/img/estudios.webp"
      },
      {
        title: "Compactaciones",
        desc: "La compactación es uno de los procesos más importantes en la construcción de terracerías y pavimentos. Mediante pruebas de campo y laboratorio se verifica que los materiales alcancen la densidad especificada, reduciendo el riesgo de asentamientos, deformaciones y fallas prematuras en la obra.<br><span class='text-normativa'>Normatividad aplicable: NMX-C-507-ONNCCE, NMX-C-476-ONNCCE.</span>",
        img: "assets/img/compactaciones.webp"
      },
      {
        title: "Terracerías",
        desc: "El control de calidad en terracerías permite verificar que los materiales utilizados en terraplenes, cortes, rellenos y plataformas cumplan con las características requeridas por el proyecto. Estas evaluaciones contribuyen a garantizar la estabilidad y capacidad de soporte de las capas que servirán como base para futuras estructuras o pavimentos.",
        img: "assets/img/terracerias.webp"
      },
      {
        title: "Pavimentos",
        desc: "Los ensayos en pavimentos permiten evaluar la calidad de los materiales que conforman su estructura, así como su capacidad para soportar las cargas generadas por el tránsito. Los resultados obtenidos son fundamentales para asegurar un adecuado desempeño y prolongar la vida útil de la infraestructura vial.",
        img: "assets/img/pavimentos.webp"
      },
      {
        title: "Asfaltos",
        desc: "Los materiales asfálticos actúan como ligante en la construcción de pavimentos flexibles. Mediante diferentes ensayos se determinan propiedades como consistencia, viscosidad, elasticidad y comportamiento ante cambios de temperatura, permitiendo verificar que el material sea adecuado para las condiciones de servicio previstas.",
        img: "assets/img/asfaltos.webp"
      },
      {
        title: "Diseño de pavimentos, rígidos y flexibles",
        desc: "El diseño de pavimentos consiste en determinar el espesor y las características de cada una de las capas que conforman la estructura vial. Para ello se consideran factores como el tránsito esperado, las propiedades del suelo y las condiciones ambientales, con el objetivo de garantizar seguridad, funcionalidad y durabilidad.",
        img: "assets/img/elas.jpg"
      },
      {
        title: "Mezclas asfálticas, en frio y/o caliente",
        desc: "El diseño y evaluación de mezclas asfálticas permite establecer la combinación óptima entre agregados y ligante asfáltico para obtener una mezcla resistente y durable. Estas pruebas ayudan a asegurar un comportamiento adecuado frente a las cargas del tránsito y las condiciones ambientales a las que estará expuesto el pavimento.<br><span class='text-normativa'>Normatividad aplicable: ASTM D6927 (Método Marshall), N-CMT-4-05-003</span>",
        img: "assets/img/mezclas.webp"
      }
    ];

    // 4. Jalamos el molde único de tu card-servicio
    fetch("components/card-servicios.html")
      .then(res => res.text())
      .then(templateHTML => {
        const contenedorGrid = document.getElementById("cards-container");

        listadoServicios.forEach(servicio => {
          const columnaBootstrap = document.createElement("div");
          
          /* 🎯 Tu bloque original de clases responsive exacto */
          columnaBootstrap.className = "col-12 col-sm-6 col-md-6 col-lg-4 d-flex justify-content-center";
          columnaBootstrap.innerHTML = templateHTML;

          columnaBootstrap.querySelector(".js-card-title").textContent = servicio.title;
          columnaBootstrap.querySelector(".js-card-text").innerHTML = servicio.desc;

          const imagenElemento = columnaBootstrap.querySelector(".js-card-img");

          /* 🎯 Cada tarjeta lee su imagen y le asignamos los tamaños de forma interna */
          if (imagenElemento) {
            imagenElemento.src = servicio.img;
            imagenElemento.alt = servicio.title;
            imagenElemento.setAttribute("width", "400");
            imagenElemento.setAttribute("height", "250");
          }

          contenedorGrid.appendChild(columnaBootstrap);
        });
      })
      .catch(error => console.error("Error generando las tarjetas de servicio:", error));

    // 5. Cargar el componente Botón Ver Más de forma dinámica
    fetch("components/boton-ver-mas.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("button-load-more").innerHTML = data;
      })
      .catch(error => console.error("Error cargando el componente boton-ver-mas:", error));

    // 6. Cargar el componente del Footer de forma dinámica
    fetch("components/footer.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      })
      .catch(error => console.error("Error cargando el componente del footer:", error));
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
